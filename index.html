<!DOCTYPE html>
<html>
<head>

<style>

color:white;

}

h1{

}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));

padding:20px;

.card{

padding:10px;
border-radius:10px;
}

img{
width:100%;
border-radius:10px;
}

button{
margin-top:10px;
padding:8px 15px;
border:none;
background:#6c3cff;
color:white;
border-radius:5px;
}
</style>
</head>

<body>

<h1>Anime Wallpaper Download</h1>

<div class="gallery">

<div class="card">
<img src="https://wallpapercave.com/wp/wp5128415.jpg">
<br>
<a href="https://wallpapercave.com/wp/wp5128415.jpg" download>
<button>Download</button>
</a>
</div>

<div class="card">
<img src="https://wallpapercave.com/wp/wp6062753.jpg">

</div>

</body>
</html>
